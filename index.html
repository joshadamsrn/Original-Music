<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listen Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>Listen Online</h1>
      <p>Click any track below to play.</p>
    </header>

    <main class="player-layout">
      <section class="now-playing card">
        <div class="cover-wrap">
          <img id="coverArt" src="https://placehold.co/600x600?text=Cover+Art" alt="Cover art" />
        </div>

        <div class="track-meta">
          <p class="eyebrow">Now Playing</p>
          <h2 id="trackTitle">Select a track</h2>
          <p id="trackArtist">Your audio player is ready for GitHub Pages.</p>
        </div>

        <audio id="audioPlayer" controls preload="none">
          Your browser does not support the audio element.
        </audio>
      </section>

      <section class="playlist card">
        <div class="playlist-header">
          <h2>Playlist</h2>
          <p>Click track below.</p>
        </div>

        <ul id="trackList" class="track-list"></ul>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
